name: Node.js Automated Production Deployment (Monolith KeepAlive)

on:
  push:
    branches:
      - main  # Zmień na master, jeśli tak nazywa się Twoja główna gałąź
    paths:
      - 'Server_app/server.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: "01. Pobieranie kodu z repozytorium GitHub"
        uses: actions/checkout@v4

      - name: "02. Wstrzykiwanie klucza prywatnego SSH"
        env:
          PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: "03. Transfer & Execute Monolith (JEDNA SESJA + KEEPALIVE)"
        run: |
          echo "📦 Rozpoczynam transfer i wdrażanie w JEDNEJ sesji odpornej na zrywanie..."
          # Flagi ServerAliveInterval i TCPKeepAlive zmuszają router do utrzymania sesji!
          tar -czf - -C Server_app server.js | ssh -T -p 22044 -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -o TCPKeepAlive=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "/bin/bash --noprofile --norc -c '
            echo "========================================="
            echo "1. Rozpakowywanie archiwum do /opt/smartlock-server/"
            tar -xzf - -C /opt/smartlock-server/ || exit 1
            
            echo "2. Weryfikacja obecności kodu"
            if grep -q "/api/firmware/version" /opt/smartlock-server/server.js; then
              echo "✅ Kod zaktualizowany!"
            else
              echo "❌ Błąd: Nowy kod nie dotarł!"
              exit 1
            fi
            
            echo "3. Restartowanie usługi smartlock"
            systemctl restart smartlock || exit 1
            
            echo "4. Sprawdzanie statusu usługi"
            sleep 2
            systemctl is-active smartlock
            echo "========================================="
            echo "🎉 Wdrożenie zakończone sukcesem!"
          '"