name: Node.js Automated Production Deployment

on:
  push:
    branches:
      - main  # Zmień na master, jeśli tak nazywa się Twoja główna gałąź
    paths:
      - 'Server_app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Copy server.js directly to Proxmox via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22044
          source: "Server_app/server.js"
          target: "/opt/smartlock-server"
          strip_components: 1  # Ta flaga usuwa człon "Server_app/" i wrzuca czysty server.js do docelowego folderu

      - name: Execute Systemd Daemon Restart over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22044
          script: |
            echo "🔄 Plik dostarczony. Restartowanie daemona smartlock..."
            systemctl restart smartlock
            echo "✅ Gotowe! Nowy kod produkcyjny został załadowany."