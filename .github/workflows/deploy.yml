name: Node.js Automated Production Deployment

on:
  push:
    branches:
      - main  # Zmień na master, jeśli tak nazywa się Twoja główna gałąź
    paths:
      - 'Server_app/server.js' # 🌟 TRIGGER: Odpali się TYLKO, gdy zmieni się ten konkretny plik!
  workflow_dispatch: # 🌟 RĘCZNY URUCHAMIACZ: Dodaje przycisk "Run workflow" na GitHubie!

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Copy ONLY server.js to Proxmox via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22044
          source: "Server_app/server.js" # 🔒 PEŁNA IZOLACJA: Kopiuje wyłącznie ten jeden plik! app.js zostaje bezpieczny na GitHubie
          target: "/opt/smartlock-server"
          strip_components: 1  # Usuwa katalog "Server_app/" z docelowej ścieżki

      - name: Execute Systemd Daemon Restart over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22044
          script: |
            echo "🔄 Plik dostarczony na Proxmox. Restartowanie daemona smartlock..."
            systemctl restart smartlock
            echo "✅ Gotowe! Nowy kod produkcyjny został załadowany."