name: Node.js Automated Production Deployment

on:
  push:
    branches:
      - main  # Zmień na master, jeśli tak nazywa się Twoja główna gałąź w repo
    paths:
      - 'Server_app/**'  # 🌟 Uruchom tylko, gdy zmiany dotyczą aplikacji serwerowej

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploying backend patch over secure SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Zalogowano na węzeł Proxmox. Pobieranie repozytorium..."
            cd /opt/smartlock-server
            
            # Pobranie zmian z GitHuba
            git fetch --all
            git reset --hard origin/main
            
            echo "📦 Przerzucam zaktualizowany server.js na pozycję produkcyjną..."
            # Kopiowanie pliku z subfoldera repozytorium do głównego katalogu serwera
            cp /opt/smartlock-server/Server_app/server.js /opt/smartlock-server/server.js
            
            echo "🔄 Restartowanie daemona smartlock w systemd..."
            systemctl restart smartlock
            
            echo "✅ Sukces! Aplikacja produkcyjna została zaktualizowana."