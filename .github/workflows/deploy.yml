name: Node.js Automated Production Deployment (Pure Native)

on:
  push:
    branches:
      - main  # Zmień na master, jeśli tak nazywa się Twoja główna gałąź
    paths:
      - 'Server_app/server.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup SSH Key on Runner
        env:
          PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "✅ Klucz SSH wstrzyknięty do maszyny GitHuba."

      - name: Transfer server.js via Raw SSH Pipe
        run: |
          echo "🚀 Przesyłam plik server.js..."
          ssh -p 22044 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cat > /opt/smartlock-server/server.js" < Server_app/server.js
          echo "✅ Plik pomyślnie zapisany na Proxmoxie!"

      - name: Execute Systemd Daemon Restart via Native SSH
        run: |
          echo "🔄 Wysyłam natywne polecenie restartu usługi przez SSH..."
          ssh -p 22044 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "systemctl restart smartlock"
          echo "🎉 Sukces! Nowy kod produkcyjny przejął kontrolę bez pośredników."