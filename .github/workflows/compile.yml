name: Automated Firmware Compiler & Release

on:
  push:
    tags:
      - 'v*' # Triggers automatically whenever you push a version tag (e.g., v2.9.5)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    # 1. Pull down your C++ source code files from the private repo
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Install the official Arduino CLI compiler engine
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    # 3. Download the specific Renesas Uno R4 board cores
    - name: Install Board Cores and Platform Toolchains
      run: |
        arduino-cli core update-index
        arduino-cli core install arduino:renesas_uno

    # 4. Pull down the exact community libraries your code depends on
    - name: Install Project Dependencies
      run: |
        # 🌟 CRITICAL FIX: Initializes the global registry cache so the runner knows where to find your files
        arduino-cli lib update-index
        
        # Install the required community modules
        arduino-cli lib install "Adafruit GFX Library"
        arduino-cli lib install "Adafruit SH110X"
        arduino-cli lib install "Adafruit BusIO"
        arduino-cli lib install "MFRC522"
        arduino-cli lib install "NTPClient"
        arduino-cli lib install "ArduinoOTA"

   - name: Compile Firmware to Binary
      run: |
        INO_FILE=$(find . -name "*.ino" | head -n 1)
        if [ -z "$INO_FILE" ]; then
          echo "❌ ERROR: No .ino file found anywhere in this repository layout!"
          exit 1
        fi
        
        SKETCH_NAME=$(basename "$INO_FILE" .ino)
        SKETCH_DIR=$(dirname "$INO_FILE")
        CURRENT_PARENT_DIR=$(basename "$SKETCH_DIR")
        
        echo "🎯 Target sketch file found: $INO_FILE"
        
        if [ "$CURRENT_PARENT_DIR" = "$SKETCH_NAME" ]; then
          echo "✅ Struktura katalogów jest już prawidłowa. Kompilacja bezpośrednia."
          COMPILE_TARGET="$SKETCH_DIR"
        else
          echo "⚙️ Plik znaleziony luzem. Czyszczenie konfliktów i tworzenie folderu roboczego: $SKETCH_NAME"
          
          # 🌟 ABSOLUTNY BEZPIECZNIK: Bezwzględnie niszczymy symlink/skrót z Git, 
          # który oszukiwał system i powodował błąd "same file"
          rm -rf "$SKETCH_NAME" 
          
          mkdir -p "$SKETCH_NAME"
          cp "$INO_FILE" "$SKETCH_NAME/$SKETCH_NAME.ino"
          cp "$SKETCH_DIR"/*.h "$SKETCH_NAME"/ 2>/dev/null || true
          cp "$SKETCH_DIR"/*.cpp "$SKETCH_NAME"/ 2>/dev/null || true
          COMPILE_TARGET="./$SKETCH_NAME"
        fi
        
        mkdir -p build
        arduino-cli compile --fqbn arduino:renesas_uno:unor4wifi --output-dir ./build "$COMPILE_TARGET"

    # 6. Rename the output file dynamically to match your server's naming convention
    - name: Package Update Asset
      run: |
        BIN_FILE=$(find ./build -name "*.bin" | head -n 1)
        cp "$BIN_FILE" "./lock_${{ github.ref_name }}.bin"

    # 7. Create the official GitHub release and attach the freshly compiled .bin file
    - name: Broadcast Release to Proxmox Network
      uses: softprops/action-gh-release@v2
      with:
        files: lock_${{ github.ref_name }}.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}