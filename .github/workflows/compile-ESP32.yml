name: Compile on tag push ESP32 

on:
  push:
    tags:
      - 'v*' # Uruchamia się automatycznie po wypchnięciu tagu wersji (np. v2.9.8)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    # 1. Pobranie kodu źródłowego C++ z Twojego repozytorium
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Instalacja oficjalnego silnika kompilatora Arduino CLI
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    # 3. Dodanie zewnętrznego repozytorium Espressif i instalacja narzędzi Xtensa dla ESP32
    - name: Install Board Cores and Platform Toolchains
      run: |
        arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

    # 4. Pobranie bibliotek społecznościowych, od których zależy Twój kod zamka
    - name: Install Project Dependencies
      run: |
        arduino-cli lib update-index
        arduino-cli lib install "Adafruit GFX Library"
        arduino-cli lib install "Adafruit SH110X"
        arduino-cli lib install "Adafruit BusIO"
        arduino-cli lib install "MFRC522"
        arduino-cli lib install "NTPClient"
        arduino-cli lib install "ArduinoOTA"

    # 5. Budowanie środowiska i kompilacja kodu bezpośrednio pod ESP32
    - name: Compile Firmware to Binary
      run: |
        INO_FILE=$(find . -name "*.ino" | head -n 1)
        if [ -z "$INO_FILE" ]; then
          echo "❌ ERROR: No .ino file found anywhere in this repository layout!"
          exit 1
        fi
        
        SKETCH_NAME=$(basename "$INO_FILE" .ino)
        SKETCH_DIR=$(dirname "$INO_FILE")
        CURRENT_PARENT_DIR=$(basename "$SKETCH_DIR")
        
        echo "🎯 Target sketch file found: $INO_FILE"
        
        if [ "$CURRENT_PARENT_DIR" = "$SKETCH_NAME" ]; then
          echo "✅ Struktura katalogów jest już prawidłowa. Kompilacja bezpośrednia."
          COMPILE_TARGET="$SKETCH_DIR"
        else
          echo "⚙️ Plik znaleziony luzem. Czyszczenie konfliktów i tworzenie folderu roboczego: $SKETCH_NAME"
          rm -rf "$SKETCH_NAME" 
          mkdir -p "$SKETCH_NAME"
          cp "$INO_FILE" "$SKETCH_NAME/$SKETCH_NAME.ino"
          cp "$SKETCH_DIR"/*.h "$SKETCH_NAME"/ 2>/dev/null || true
          cp "$SKETCH_DIR"/*.cpp "$SKETCH_NAME"/ 2>/dev/null || true
          COMPILE_TARGET="./$SKETCH_NAME"
        fi
        
        mkdir -p build
        arduino-cli compile --fqbn esp32:esp32:esp32 --output-dir ./build "$COMPILE_TARGET"

    # 6. Filtrowanie i izolacja czystego pliku aplikacji (Odrzucamy 4-megabajtowy merged.bin)
    - name: Package Update Asset
      run: |
        BIN_FILE=$(find ./build -name "*.ino.bin" ! -name "*.merged.bin" ! -name "*.bootloader.bin" ! -name "*.partitions.bin" | head -n 1)
        if [ -z "$BIN_FILE" ]; then
          BIN_FILE=$(find ./build -name "*.bin" ! -name "*merged*" ! -name "*bootloader*" ! -name "*partitions*" | head -n 1)
        fi
        echo "💡 Wybrany właściwy, lekki plik binarny aplikacji: $BIN_FILE"
        cp "$BIN_FILE" "./lock_${{ github.ref_name }}.bin"

    # 7. Automatyczne stworzenie wydania i podpięcie odchudzonego pliku aktualizacji
    - name: Broadcast Release to Proxmox Network
      uses: softprops/action-gh-release@v2
      with:
        files: lock_${{ github.ref_name }}.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}